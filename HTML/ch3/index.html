<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>

<body>
    <div>
        <form action=""></form>
    </div>
    <form action="">
        <label for="Name">Name</label>
        <input type="text" id="Name" placeholder="Enter Your Name">
        <label for="Surname">Enter Your Surname</label>
        <input type="text" id="Surname" placeholder="Enter Your Surname">
        <br>

        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <br>
        <input type="checkbox" id="term&condition" name="term&condition" value="yes">
        <label for="term&condition">term and condition</label><br>
        <select name="course" id="" required>
            <option value="Bca">Bca</option>
            <option value="Mca">Mca</option>
            <option value="B.Tech">B.Tech</option>
            <option value="M.Tech">M.Tech</option>
        </select>
        <br>
        <textarea name="comment" rows="4" cols="150" id="">
            Enter Somthing
        </textarea>
    </form>
</body>

</html>
